apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      securityContext:
        fsGroup: 0
      containers:
        - name: airflow
          image: image-registry.openshift-image-registry.svc:5000/REPLACE_WITH_PROJECT/goldenizacja-airflow:latest
          command: ["/usr/local/bin/start-airflow"]
          ports:
            - containerPort: 8080
          env:
            - name: AIRFLOW_HOME
              valueFrom:
                configMapKeyRef:
                  name: goldenizacja-config
                  key: AIRFLOW_HOME
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__CORE__EXECUTOR
              value: SequentialExecutor
            - name: AIRFLOW__CORE__AUTH_MANAGER
              value: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
            - name: AIRFLOW__API__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: goldenizacja-secrets
                  key: AIRFLOW_API_SECRET_KEY
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: goldenizacja-secrets
                  key: AIRFLOW_JWT_SECRET
            - name: AIRFLOW_USERNAME
              valueFrom:
                secretKeyRef:
                  name: goldenizacja-secrets
                  key: AIRFLOW_USERNAME
            - name: AIRFLOW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: goldenizacja-secrets
                  key: AIRFLOW_PASSWORD
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: airflow-dags
              mountPath: /opt/airflow/dags/example_goldenizacja.py
              subPath: example_goldenizacja.py
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: airflow-dags
          configMap:
            name: airflow-dags
---
apiVersion: v1
kind: Service
metadata:
  name: airflow
spec:
  selector:
    app: airflow
  ports:
    - name: http
      port: 8080
      targetPort: 8080
