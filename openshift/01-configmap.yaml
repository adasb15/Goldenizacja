apiVersion: v1
kind: ConfigMap
metadata:
  name: goldenizacja-config
data:
  APP_NAME: goldenizacja-api
  APP_ENV: prod
  API_HOST: 0.0.0.0
  API_PORT: "8000"
  MSSQL_SERVER: mssql
  MSSQL_PORT: "1433"
  MSSQL_DB: goldenizacja
  MSSQL_USER: sa
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  FILESTREAM_PATH: /data/filestream
  CORS_ORIGINS: https://REPLACE_API_ROUTE,https://REPLACE_FRONTEND_ROUTE
  AIRFLOW_HOME: /opt/airflow
