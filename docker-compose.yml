services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goldenizacja-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /workspace/app
    depends_on:
      mssql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./app:/workspace/app
      - filestream_data:/data/filestream

  frontend:
    image: node:20-alpine
    container_name: goldenizacja-frontend
    working_dir: /frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules
    depends_on:
      - api

  airflow:
    image: apache/airflow:2.10.2-python3.12
    container_name: goldenizacja-airflow
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      _AIRFLOW_WWW_USER_USERNAME: "${AIRFLOW_USERNAME:-admin}"
      _AIRFLOW_WWW_USER_PASSWORD: "${AIRFLOW_PASSWORD:-admin}"
    command: >
      bash -c "
      airflow db migrate &&
      (
      airflow users create
      --username ${AIRFLOW_USERNAME:-admin}
      --password ${AIRFLOW_PASSWORD:-admin}
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      || airflow users reset-password
      --username ${AIRFLOW_USERNAME:-admin}
      --password ${AIRFLOW_PASSWORD:-admin}
      ) &&
      exec airflow standalone
      "
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: goldenizacja-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_PASSWORD}"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mssql_data:/var/opt/mssql

  neo4j:
    image: neo4j:5.24
    container_name: goldenizacja-neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # adminer:
  #   image: adminer:latest
  #   container_name: goldenizacja-adminer
  #   depends_on:
  #     mssql:
  #       condition: service_healthy
  #   ports:
  #     - "8082:8080"

volumes:
  mssql_data:
  neo4j_data:
  neo4j_logs:
  filestream_data:
  frontend_node_modules:
